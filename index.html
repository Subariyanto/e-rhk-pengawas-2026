  <!-- One-time cleanup: unregister stale service workers + clear old caches.
       Runs once per browser; safe no-op afterwards. -->
  <script>
  (function(){
    var KEY='erhk2026_cleanup_v4';
    if(localStorage.getItem(KEY)==='done') return;
    var didWork=false;
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations().then(function(rs){
        rs.forEach(function(r){ r.unregister(); didWork=true; });
      }).catch(function(){});
    }
    if(window.caches){
      caches.keys().then(function(keys){
        return Promise.all(keys.map(function(k){
          if(k && k.indexOf('erhk-2026-v4')<0){ didWork=true; return caches.delete(k); }
        }));
      }).then(function(){
        localStorage.setItem(KEY,'done');
        if(didWork){ location.reload(); }
      }).catch(function(){ localStorage.setItem(KEY,'done'); });
    } else {
      localStorage.setItem(KEY,'done');
    }
  })();
  </script>
